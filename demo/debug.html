<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenon Debug</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .debug-panel {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .view {
            display: flex;
        }
        .text {
            padding: 4px 8px;
        }
        .image {
            background: #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧩 Tenon Debug Panel</h1>
        <div class="debug-panel">
        <div class="view" style="flex-direction: row; justify-content: flex-start; align-items: stretch; width: 400px; height: 300px; background: #ffffff; padding: 20px; margin: 0px; margin-bottom: 0px; margin-right: 0px; border: 1px dashed #ccc; ">
            <div class="view" style="flex-direction: row-reverse; justify-content: space-between; align-items: flex-end; width: 0px; height: 50px; padding: 0px; margin: 0px; margin-bottom: 20px; margin-right: 0px; border: 1px dashed #ccc; ">
                <span class="text" style="font-size: 20px; color: #495057; ">Dashboard</span>
                <span class="text" style="font-size: 14px; color: #868e96; ">Welcome back!</span>
            <div class="view" style="flex-direction: row-reverse; justify-content: flex-start; align-items: stretch; width: 0px; height: 0px; padding: 0px; margin: 0px; margin-bottom: 0px; margin-right: 0px; flex-grow: 1; border: 1px dashed #ccc; ">
                <div class="view" style="flex-direction: row; justify-content: flex-start; align-items: stretch; width: 200px; height: 0px; padding: 0px; margin: 0px; margin-bottom: 0px; margin-right: 20px; border: 1px dashed #ccc; ">
                    <div class="view" style="flex-direction: row-reverse; justify-content: flex-start; align-items: stretch; width: 300px; height: 150px; background: #f8f9fa; padding: 15px; margin: 0px; margin-bottom: 0px; margin-right: 0px; border: 1px dashed #ccc; ">
                        <div class="view" style="flex-direction: row; justify-content: flex-start; align-items: stretch; width: 80px; height: 80px; background: #e9ecef; padding: 0px; margin: 10px; margin-bottom: 0px; margin-right: 0px; border: 1px dashed #ccc; ">
                            <span class="text" style="font-size: 12px; color: #6c757d; ">Avatar</span>
                        <div class="view" style="flex-direction: row; justify-content: space-around; align-items: stretch; width: 0px; height: 0px; padding: 0px; margin: 0px; margin-bottom: 0px; margin-right: 0px; flex-grow: 1; border: 1px dashed #ccc; ">
                            <span class="text" style="font-size: 18px; color: #212529; ">John Doe</span>
                            <span class="text" style="font-size: 14px; color: #6c757d; ">Software Engineer</span>
                            <span class="text" style="font-size: 12px; color: #adb5bd; ">San Francisco, CA</span>
                <div class="view" style="flex-direction: row; justify-content: flex-end; align-items: stretch; width: 0px; height: 0px; padding: 0px; margin: 0px; margin-bottom: 0px; margin-right: 0px; flex-grow: 1; border: 1px dashed #ccc; ">
                    <div class="view" style="flex-direction: row; justify-content: space-around; align-items: flex-end; width: 200px; height: 100px; background: #ffffff; padding: 20px; margin: 0px; margin-bottom: 0px; margin-right: 0px; border: 1px dashed #ccc; ">
                        <span class="text" style="font-size: 16px; color: #333333; ">Counter Component</span>
                        <div class="view" style="flex-direction: row-reverse; justify-content: flex-end; align-items: flex-end; width: 120px; height: 40px; background: #f0f0f0; padding: 0px; margin: 0px; margin-bottom: 0px; margin-right: 0px; border: 1px dashed #ccc; ">
                            <span class="text" style="font-size: 14px; color: #666666; ">Count: 42</span>

        </div>
    </div>
</body>
</html>
