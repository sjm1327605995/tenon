name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      # Ebiten needs OpenGL/X headers to build on Linux (tests build but don't open a window).
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev xorg-dev libasound2-dev

      - name: gofmt
        run: |
          fmt=$(gofmt -l pkg example)
          if [ -n "$fmt" ]; then echo "Not gofmt'd:"; echo "$fmt"; exit 1; fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./...
