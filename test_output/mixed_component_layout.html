<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenon Debug</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .debug-panel {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .view {
            display: flex;
        }
        .text {
            padding: 4px 8px;
        }
        .image {
            background: #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tenon Debug Panel</h1>
        <div class="debug-panel">
        <div class="view" style="flex-direction: row; justify-content: space-between; align-items: stretch; width: 800px; height: 600px; background: #f7fafc; padding: 20px; margin: 0px; margin-bottom: 0px; margin-right: 0px; border: 1px dashed #ccc; ">
            <div class="view" style="flex-direction: row; justify-content: flex-start; align-items: center; width: 250px; height: 80px; background: #2d3748; padding: 12px; margin: 0px; margin-bottom: 10px; margin-right: 0px; border: 1px dashed #ccc; ">
                <div class="view" style="flex-direction: column; justify-content: flex-start; align-items: stretch; width: 50px; height: 50px; background: #4a5568; padding: 0px; margin: 0px; margin-bottom: 0px; margin-right: 12px; border: 1px dashed #ccc; ">
                <div class="view" style="flex-direction: column; justify-content: center; align-items: stretch; width: 0px; height: 0px; padding: 0px; margin: 0px; margin-bottom: 0px; margin-right: 0px; flex-grow: 1; border: 1px dashed #ccc; ">
                    <span class="text" style="font-size: 16px; color: #ffffff; ">John Doe</span>
                    <span class="text" style="font-size: 12px; color: #a0aec0; ">Software Engineer</span>
            <div class="view" style="flex-direction: row; justify-content: flex-start; align-items: center; width: 250px; height: 80px; background: #2d3748; padding: 12px; margin: 0px; margin-bottom: 10px; margin-right: 0px; border: 1px dashed #ccc; ">
                <div class="view" style="flex-direction: column; justify-content: flex-start; align-items: stretch; width: 50px; height: 50px; background: #4a5568; padding: 0px; margin: 0px; margin-bottom: 0px; margin-right: 12px; border: 1px dashed #ccc; ">
                <div class="view" style="flex-direction: column; justify-content: center; align-items: stretch; width: 0px; height: 0px; padding: 0px; margin: 0px; margin-bottom: 0px; margin-right: 0px; flex-grow: 1; border: 1px dashed #ccc; ">
                    <span class="text" style="font-size: 16px; color: #ffffff; ">Jane Smith</span>
                    <span class="text" style="font-size: 12px; color: #a0aec0; ">Product Manager</span>
            <div class="view" style="flex-direction: row; justify-content: flex-start; align-items: center; width: 250px; height: 80px; background: #2d3748; padding: 12px; margin: 0px; margin-bottom: 10px; margin-right: 0px; border: 1px dashed #ccc; ">
                <div class="view" style="flex-direction: column; justify-content: flex-start; align-items: stretch; width: 50px; height: 50px; background: #4a5568; padding: 0px; margin: 0px; margin-bottom: 0px; margin-right: 12px; border: 1px dashed #ccc; ">
                <div class="view" style="flex-direction: column; justify-content: center; align-items: stretch; width: 0px; height: 0px; padding: 0px; margin: 0px; margin-bottom: 0px; margin-right: 0px; flex-grow: 1; border: 1px dashed #ccc; ">
                    <span class="text" style="font-size: 16px; color: #ffffff; ">Bob Wilson</span>
                    <span class="text" style="font-size: 12px; color: #a0aec0; ">Designer</span>
            <div class="view" style="flex-direction: column; justify-content: center; align-items: stretch; width: 245px; height: 120px; background: #4299e1; padding: 15px; margin: 0px; margin-bottom: 10px; margin-right: 0px; border: 1px dashed #ccc; ">
                <span class="text" style="font-size: 18px; color: #ffffff; ">Quick Stats</span>
                <span class="text" style="font-size: 14px; color: #e2e8f0; ">Tasks: 12 | Completed: 8</span>
            <div class="view" style="flex-direction: column; justify-content: center; align-items: stretch; width: 245px; height: 120px; background: #48bb78; padding: 15px; margin: 0px; margin-bottom: 10px; margin-right: 0px; border: 1px dashed #ccc; ">
                <span class="text" style="font-size: 18px; color: #ffffff; ">Activity</span>
                <span class="text" style="font-size: 14px; color: #e2e8f0; ">Last active: 5 mins ago</span>
            <div class="view" style="flex-direction: column; justify-content: center; align-items: stretch; width: 245px; height: 120px; background: #ed8936; padding: 15px; margin: 0px; margin-bottom: 10px; margin-right: 0px; border: 1px dashed #ccc; ">
                <span class="text" style="font-size: 18px; color: #ffffff; ">Notifications</span>
                <span class="text" style="font-size: 14px; color: #e2e8f0; ">3 new messages</span>

        </div>
    </div>
</body>
</html>
