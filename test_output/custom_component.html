<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenon Debug</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .debug-panel {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .view {
            display: flex;
        }
        .text {
            padding: 4px 8px;
        }
        .image {
            background: #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tenon Debug Panel</h1>
        <div class="debug-panel">
        <div class="view" style="flex-direction: column; justify-content: flex-start; align-items: stretch; width: 500px; height: 400px; background: #1a202c; padding: 20px; margin: 0px; margin-bottom: 0px; margin-right: 0px; border: 1px dashed #ccc; ">
            <span class="text" style="font-size: 24px; color: #ffffff; ">Custom Component Demo</span>
            <div class="view" style="flex-direction: column; justify-content: space-between; align-items: stretch; width: 200px; height: 150px; background: #3182ce; padding: 16px; margin: 0px; margin-bottom: 10px; margin-right: 10px; border: 1px dashed #ccc; ">
                <span class="text" style="font-size: 18px; color: #ffffff; ">Card 1</span>
                <span class="text" style="font-size: 14px; color: #e0e0e0; ">This is a reusable card component</span>
            <div class="view" style="flex-direction: column; justify-content: space-between; align-items: stretch; width: 200px; height: 150px; background: #38a169; padding: 16px; margin: 0px; margin-bottom: 10px; margin-right: 10px; border: 1px dashed #ccc; ">
                <span class="text" style="font-size: 18px; color: #ffffff; ">Card 2</span>
                <span class="text" style="font-size: 14px; color: #e0e0e0; ">Custom components enable composition</span>
            <div class="view" style="flex-direction: column; justify-content: space-between; align-items: stretch; width: 200px; height: 150px; background: #e53e3e; padding: 16px; margin: 0px; margin-bottom: 10px; margin-right: 10px; border: 1px dashed #ccc; ">
                <span class="text" style="font-size: 18px; color: #ffffff; ">Card 3</span>
                <span class="text" style="font-size: 14px; color: #e0e0e0; ">Mixing custom and built-in components</span>

        </div>
    </div>
</body>
</html>
