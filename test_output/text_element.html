<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenon Debug</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .debug-panel {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .view {
            display: flex;
        }
        .text {
            padding: 4px 8px;
        }
        .image {
            background: #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tenon Debug Panel</h1>
        <div class="debug-panel">
        <span class="text" style="font-size: 16px; color: #333333; ">Hello, Tenon!</span>

        </div>
    </div>
</body>
</html>
