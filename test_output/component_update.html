<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenon Debug</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .debug-panel {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .view {
            display: flex;
        }
        .text {
            padding: 4px 8px;
        }
        .image {
            background: #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tenon Debug Panel</h1>
        <div class="debug-panel">
        <div class="view" style="flex-direction: column; justify-content: space-between; align-items: stretch; width: 400px; height: 300px; background: #ffffff; padding: 20px; margin: 0px; margin-bottom: 0px; margin-right: 0px; border: 1px dashed #ccc; ">
            <div class="view" style="flex-direction: row; justify-content: flex-start; align-items: center; width: 0px; height: 0px; padding: 0px; margin: 0px; margin-bottom: 15px; margin-right: 0px; border: 1px dashed #ccc; ">
                <div class="view" style="flex-direction: column; justify-content: flex-start; align-items: stretch; width: 60px; height: 60px; background: #667eea; padding: 0px; margin: 0px; margin-bottom: 0px; margin-right: 15px; border: 1px dashed #ccc; ">
                <div class="view" style="flex-direction: column; justify-content: flex-start; align-items: stretch; width: 0px; height: 0px; padding: 0px; margin: 0px; margin-bottom: 0px; margin-right: 0px; flex-grow: 1; border: 1px dashed #ccc; ">
                    <span class="text" style="font-size: 20px; color: #1a202c; ">User Profile</span>
                    <span class="text" style="font-size: 14px; color: #38a169; ">Online</span>
            <div class="view" style="flex-direction: column; justify-content: space-between; align-items: stretch; width: 360px; height: 100px; background: #f7fafc; padding: 15px; margin: 0px; margin-bottom: 0px; margin-right: 0px; border: 1px dashed #ccc; ">
                <div class="view" style="flex-direction: row; justify-content: space-between; align-items: stretch; width: 0px; height: 0px; padding: 0px; margin: 0px; margin-bottom: 8px; margin-right: 0px; border: 1px dashed #ccc; ">
                    <span class="text" style="font-size: 14px; color: #718096; ">Posts</span>
                    <span class="text" style="font-size: 14px; color: #1a202c; ">42</span>
                <div class="view" style="flex-direction: row; justify-content: space-between; align-items: stretch; width: 0px; height: 0px; padding: 0px; margin: 0px; margin-bottom: 0px; margin-right: 0px; border: 1px dashed #ccc; ">
                    <span class="text" style="font-size: 14px; color: #718096; ">Followers</span>
                    <span class="text" style="font-size: 14px; color: #1a202c; ">1234</span>

        </div>
    </div>
</body>
</html>
